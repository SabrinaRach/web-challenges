<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Personal Profile Form</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <h1>Create your Personal Profile</h1>
    <form>
    <fieldset>
      <p id="descriptionPersonalInformation">
        We want to get to know you! Please enter your personal information.
      </p>
      <fieldset>
        <legend>Personal Information</legend>
        <label for="firstname">First Name:</label>
        <input type="text" name="firstname" id="firstname" />

        <label for="lastname">Last Name:</label>
        <input type="text" name="lastname" id="lastname" />

        <label for="birthday">Your Birthday:</label>
        <input type="date" name="birthday" id="birthday" />
        </fieldset>
      </form>
      <p id="descriptionFurtherInformation">
        Can you tell us a little bit more? We want to annoy you with unwanted
        ads.
      </p>
      <fieldset>
        <legend>Further Information</legend>
        <label for="favouritecolor">Favourite Color:</label>
        <input
          type="color"
          value="#E5430F"
          name="favouritecolor"
          id="favouritecolor"
        />
        <label for="favouritepet">What's your favourite pet?</label>
        <select name="favouritepet" id="favouritepet">
          <option selected disabled>--Please choose an option--</option>
          <option value="animal1">Agra Cadabra</option>
          <option value="animal2">Chicken Turtle</option>
          <option value="animal3">Fried Egg Jellyfish</option>
        </select>
        </fieldset>
        <button type="submit">Submit</button>
      
    </fieldset>
    </form>
  </body>
</html>
