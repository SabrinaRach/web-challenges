<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Forms and Ally</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <h1 class="title" id="title">Understanding Ally in Forms</h1>
    <p id="description">
      Please let us know how we can support you with ally issues.
    </p>

    <form aria-labelledby="title">
      <fieldset aria-describedby="description">
        <legend>Enter your information</legend>
        <label for="name-input">Name:</label>
        <input id="name-input" type="text" />
        <label for="age-input">Age:</label>
        <input id="age-input" type="number" />
        <label for="color-input">Color you cannot see:</label>
        <input id="color-input" type="color" aria-describedby="color-help" />
        <p id="color-help">Select a color that is difficult to distinguish.</p>
        <label for="message">Message:</label>
        <textarea rows="7"></textarea>
        <button type="submit">Submit</button>
      </fieldset>
    </form>
  </body>
</html>
